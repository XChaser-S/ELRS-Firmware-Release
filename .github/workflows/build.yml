on:
  schedule:
    - cron: '0 0 * * *' # 第一次每天 UTC 时间 0:00 运行，即北京时间早上 8:00
  workflow_dispatch:
    inputs:
      release_version:
        description: '指定 ELRS 版本（留空表示自动检测最新版本，如 v3.3.2）'
        required: false
        default: ''
  
jobs:
  check_release:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.check_release.outputs.tag_name }}
      has_new_version: ${{ steps.check_release.outputs.has_new_version }}
    steps:
      - name: 下载此仓库
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: 缓存 pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-check-release

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 检查的 ELRS 发布
        id: check_release
        run: |
          python -c "
          import requests
          import os
          from datetime import datetime, timedelta

          # 如果手动输入了版本，直接使用该版本
          manual_version = '${{ github.event.inputs.release_version }}'.strip()
          if manual_version:
            print(f'📌 使用手动指定的版本: {manual_version}')
            os.system(f'echo \"tag_name={manual_version}\" >> \$GITHUB_OUTPUT')
            os.system('echo \"has_new_version=true\" >> \$GITHUB_OUTPUT')
          else:
            # 否则自动检测最新版本
            url = 'https://api.github.com/repos/ExpressLRS/ExpressLRS/releases/latest'
            response = requests.get(url)
            release = response.json()
            
            tag_name = release['tag_name']
            os.system(f'echo \"tag_name={tag_name}\" >> \$GITHUB_OUTPUT')
            
            release_date_str = release['published_at']
            release_date = datetime.strptime(release_date_str, '%Y-%m-%dT%H:%M:%SZ')
            beijing_time = release_date + timedelta(hours=8)

            print('最新的Release：', tag_name, '  发布于北京时间：', beijing_time.strftime('%Y-%m-%d %H:%M:%S'))

            now = datetime.utcnow()
            elapsed_time = now - release_date

            if elapsed_time <= timedelta(hours=24):
              print('最近24小时内有新的Release：', tag_name, '  即将开始编译最新版本固件！')
              os.system('echo \"has_new_version=true\" >> \$GITHUB_OUTPUT')
            else:
              print('最近24小时内没有新的Release，即将退出！(手动运行时请忽略)')
              os.system('echo \"has_new_version=false\" >> \$GITHUB_OUTPUT')
          "

  targets:
    if: ${{ needs.check_release.outputs.has_new_version == 'true' || github.event_name == 'workflow_dispatch'}}
    needs: [check_release]
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.set-targets.outputs.targets }}
    steps:
      - name: 获取最新 ELRS 设备列表
        uses: actions/checkout@v4
        with:
          repository: ExpressLRS/ExpressLRS
          fetch-depth: 0
          ref: ${{ needs.check_release.outputs.tag_name }}
      - id: set-targets
        run: |
          # 提取所有 targets（包括 UART, STLINK, SPI, I2C 等），并排除 DEPRECATED
          TARGETS=$(
            {
              grep '^\[env:' src/targets/unified.ini 2>/dev/null | sed 's/\[env://;s/\]//' || true
              grep -r '^\[env:' src/targets/*.ini 2>/dev/null | sed 's/.*\[env://;s/\]//' || true
            } | \
            grep -v '^$' | \
            grep -v DEPRECATED | \
            sort -u | \
            awk 'BEGIN{ORS=""} NR==1{printf "[\"%s\"", $0} NR>1{printf ", \"%s\"", $0} END{print "]"}'
          )
          
          # 验证提取结果
          if [ -z "$TARGETS" ] || [ "$TARGETS" = "[]" ]; then
            echo "❌ 无法提取有效的目标环境"
            exit 1
          fi
          
          echo "targets=${TARGETS}" >> $GITHUB_OUTPUT
          echo "✅ 成功提取目标: ${TARGETS}"
          
  build:
    needs: [check_release, targets]
    strategy:
      fail-fast: false
      matrix:
        target: ${{fromJSON(needs.targets.outputs.targets)}}
    runs-on: ubuntu-latest

    steps:
      - name: 获取最新 ELRS 代码
        uses: actions/checkout@v4
        with:
          repository: ExpressLRS/ExpressLRS
          fetch-depth: 0
          ref: ${{ needs.check_release.outputs.tag_name }}

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 缓存 pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ github.run_id }}-${{ strategy.job-index }}
          
      - name: 安装 PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio
          pip install wheel
      
      - name: 缓存 PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-platformio-${{ github.run_id }}
          
      - name: 编译固件
        run: |
          # 使用工作区路径保存产物，避免 ~ 展开问题
          mkdir -p "$GITHUB_WORKSPACE/artifacts/firmware"
          cd src
          
          # 清理旧的编译输出以避免链接器错误
          rm -rf .pio/build .pio/libdeps
          
          platformio pkg install --platform native
          platformio pkg update --no-save
          
          # 获取 PlatformIO 可用的 env 列表（支持多种 platformio/pio 版本的回退）
          VALID_OUTPUT="$( (command -v pio >/dev/null 2>&1 && pio env list) \
            || (platformio project env list 2>/dev/null) \
            || (platformio env list 2>/dev/null) )" || true
          
          # 处理输出，提取 env 名称为 | 分隔形式
          VALID_TARGETS="$(echo "$VALID_OUTPUT" | grep -v '^\[' | awk '{print $1}' | tr '\n' '|' | sed 's/|$//')"
          
          echo "PlatformIO env list raw:"
          echo "$VALID_OUTPUT"
          echo "Parsed valid targets: $VALID_TARGETS"
          
          # 如果解析为空则记录警告但不要盲目退出（防止误跳过），改为继续构建并让 pio run 决定是否成功
          if [ -z "$VALID_TARGETS" ]; then
            echo "⚠️ Could not detect PlatformIO envs — skipping pre-check and proceeding to build (build step will fail if env invalid)"
          else
            if ! echo "${{ matrix.target }}" | grep -qE "^($VALID_TARGETS)$"; then
              echo "⚠️  跳过无效的环境: ${{ matrix.target }}"
              exit 0
            fi
          fi
          
          case ${{matrix.target}} in
            *2400* | FM30*)
              # release builds (LBT & FCC)
              PLATFORMIO_BUILD_FLAGS="-DRegulatory_Domain_EU_CE_2400" pio run -e ${{ matrix.target }}
              OUTDIR="$GITHUB_WORKSPACE/artifacts/firmware/LBT/$(echo "${{ matrix.target }}" | sed s/_via.*//)"
              mkdir -p "$OUTDIR"
              mv .pio/build/${{ matrix.target }}/*.{elrs,bin,elf,map} "$OUTDIR" 2>/dev/null || { echo "⚠️ Warning: LBT build artifacts not found"; }

              PLATFORMIO_BUILD_FLAGS="-DRegulatory_Domain_ISM_2400" pio run -e ${{ matrix.target }}
              OUTDIR="$GITHUB_WORKSPACE/artifacts/firmware/FCC/$(echo "${{ matrix.target }}" | sed s/_via.*//)"
              mkdir -p "$OUTDIR"
              mv .pio/build/${{ matrix.target }}/*.{elrs,bin,elf,map} "$OUTDIR" 2>/dev/null || { echo "⚠️ Warning: FCC build artifacts not found"; }
              ;;
            *)
              # release build (single)
              PLATFORMIO_BUILD_FLAGS="-DRegulatory_Domain_FCC_915" pio run -e ${{ matrix.target }}
              OUTDIR="$GITHUB_WORKSPACE/artifacts/firmware/FCC/$(echo "${{ matrix.target }}" | sed s/_via.*//)"
              mkdir -p "$OUTDIR"
              mv .pio/build/${{ matrix.target }}/*.{elrs,bin,elf,map} "$OUTDIR" 2>/dev/null || { echo "⚠️ Warning: Build artifacts not found"; }
              ;;
          esac

          # Debug 输出：列出产物，便于调试上传问题
          echo "=== Artifacts produced under $GITHUB_WORKSPACE/artifacts ==="
          ls -la "$GITHUB_WORKSPACE/artifacts" || true
          find "$GITHUB_WORKSPACE/artifacts" -type f -print || true

      - name: 验证是否有产物可上传
        run: |
          if ! find "$GITHUB_WORKSPACE/artifacts" -type f -print -quit >/dev/null 2>&1; then
            echo "❌ No artifacts found to upload (failing early)"
            ls -la "$GITHUB_WORKSPACE" || true
            exit 1
          fi
          echo "✅ Found build artifacts, proceeding to upload"

      - name: 保存固件 (上传 artifact per-matrix)
        uses: actions/upload-artifact@v4
        with:
          # 使用 matrix target 作为 artifact 名称以避免覆盖
          name: firmware-${{ matrix.target }}
          path: ${{ github.workspace }}/artifacts/**/*
          if-no-files-found: warn

  firmware:
    needs: [check_release, targets, build]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 下载最新 ELRS 代码
        uses: actions/checkout@v4
        with:
          repository: ExpressLRS/ExpressLRS
          fetch-depth: 0
          ref: ${{ needs.check_release.outputs.tag_name }}

      - name: 获取固件
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: 检查是否有编译产物
        run: |
          if [ ! -d "dist" ] || [ -z "$(find dist -type f -name '*.bin' -o -name '*.elrs' 2>/dev/null)" ]; then
            echo "❌ 没有发现任何编译产物，停止打包"
            find dist -type f 2>/dev/null | head -20 || echo "dist 目录为空"
            exit 1
          fi
          echo "✅ 找到编译产物，继续处理"

      - name: 获取硬件目录
        uses: actions/checkout@v4
        with:
          repository: ExpressLRS/targets
          fetch-depth: 0
          path: src/hardware

      - name: 复制硬件配置文件到文件夹
        run: |
          mkdir -p dist/firmware
          cp -r src/hardware/* dist/firmware/ || true

      - name: 复制 Lua 脚本到文件夹
        run: |
          mkdir -p dist/firmware/lua
          cp -r src/lua/elrsV3.lua dist/firmware/lua/ || true

      - name: 复制 bootloader 到文件夹
        run: |
          if [ -d "src/bootloader" ]; then
            cd src
            find bootloader -name \*.bin -o -name \*.frk | grep -v src/ | cpio -pdm ../dist/firmware 2>/dev/null || true
          fi

      - name: 合并所有固件到单一目录
        run: |
          # 将所有 firmware-* artifact 的内容合并到 dist/firmware
          for dir in dist/firmware-*; do
            if [ -d "$dir" ]; then
              echo "Merging $dir into dist/firmware"
              cp -r "$dir"/* dist/firmware/ 2>/dev/null || true
            fi
          done
          
          echo "✅ Final firmware structure:"
          find dist/firmware -type f | head -30

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 用 shiv 编译挂件刷写进制文件
        run: |
          cd src/python
          pip install shiv
          shiv -c flash -o ../../dist/firmware/flasher.pyz pyserial . 2>/dev/null || echo "⚠️ Warning: flasher.pyz build skipped"
      
      - name: 上传固件到 artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-complete
          path: dist/**/*
          if-no-files-found: warn

      - name: 下载此仓库代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 创建固件压缩包
        run: |
          mkdir -p releases/${{ needs.check_release.outputs.tag_name }}
          
          # 确保 dist/firmware 存在且不为空
          if [ ! -d "dist/firmware" ] || [ -z "$(find dist/firmware -type f 2>/dev/null)" ]; then
            echo "❌ dist/firmware 为空，无法创建压缩包"
            find dist -type f | head -20
            exit 1
          fi
          
          cp -r dist/firmware releases/${{ needs.check_release.outputs.tag_name }}/
          cd releases
          zip -r -9 ../${{ needs.check_release.outputs.tag_name }}_firmware.zip ./${{ needs.check_release.outputs.tag_name }}
          ls -lh ../${{ needs.check_release.outputs.tag_name }}_firmware.zip
      
      - name: 提交并推送编译结果到仓库
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          mkdir -p releases_archive
          mv ${{ needs.check_release.outputs.tag_name }}_firmware.zip releases_archive/ || true
          git add releases_archive/
          git commit -m "Add firmware release: ${{ needs.check_release.outputs.tag_name }}" --allow-empty || true
          git push origin main || git push origin master || true

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.check_release.outputs.tag_name }}
          files: releases_archive/${{ needs.check_release.outputs.tag_name }}_firmware.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
